<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Storage API demo showing cookies, local storage, session storage, IndexedDB and cache API">
    <title>Web Storage Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Web Storage Demo</h1>
    </header>
    
    <main class="container">
        <section class="storage-section" id="cookies-section">
            <h2>Cookies</h2>
            <form class="storage-form" onsubmit="event.preventDefault();">
                <div class="input-row">
                    <input type="text" id="cookie-key" placeholder="Key" aria-label="Cookie key">
                    <input type="text" id="cookie-value" placeholder="Value" aria-label="Cookie value">
                    <button type="button" onclick="setCookie()">Set</button>
                </div>
                <div class="button-row">
                    <button type="button" onclick="getCookie()">Fetch</button>
                    <button type="button" onclick="deleteCookie()">Delete</button>
                    <button type="button" onclick="checkCookieSize()">Check Size</button>
                </div>
            </form>
            <div id="cookie-result" aria-live="polite" role="status"></div>
        </section>

        <section class="storage-section" id="localstorage-section">
            <h2>Local Storage</h2>
            <form class="storage-form" onsubmit="event.preventDefault();">
                <div class="input-row">
                    <input type="text" id="local-key" placeholder="Key" aria-label="Local storage key">
                    <input type="text" id="local-value" placeholder="Value" aria-label="Local storage value">
                    <button type="button" onclick="setLocalStorage()">Set</button>
                </div>
                <div class="button-row">
                    <button type="button" onclick="getLocalStorage()">Fetch</button>
                    <button type="button" onclick="deleteLocalStorage()">Delete</button>
                    <button type="button" onclick="checkLocalStorageSize()">Check Size</button>
                </div>
            </form>
            <div id="local-result" aria-live="polite" role="status"></div>
        </section>

        <section class="storage-section" id="sessionstorage-section">
            <h2>Session Storage</h2>
            <form class="storage-form" onsubmit="event.preventDefault();">
                <div class="input-row">
                    <input type="text" id="session-key" placeholder="Key" aria-label="Session storage key">
                    <input type="text" id="session-value" placeholder="Value" aria-label="Session storage value">
                    <button type="button" onclick="setSessionStorage()">Set</button>
                </div>
                <div class="button-row">
                    <button type="button" onclick="getSessionStorage()">Fetch</button>
                    <button type="button" onclick="deleteSessionStorage()">Delete</button>
                    <button type="button" onclick="checkSessionStorageSize()">Check Size</button>
                </div>
            </form>
            <div id="session-result" aria-live="polite" role="status"></div>
        </section>

        <section class="storage-section" id="indexeddb-section">
            <h2>IndexedDB</h2>
            <form class="storage-form" onsubmit="event.preventDefault();">
                <div class="input-row">
                    <input type="text" id="idb-key" placeholder="Key" aria-label="IndexedDB key">
                    <input type="text" id="idb-value" placeholder="Value" aria-label="IndexedDB value">
                    <button type="button" onclick="setIndexedDB()">Set</button>
                </div>
                <div class="button-row">
                    <button type="button" onclick="getIndexedDB()">Fetch</button>
                    <button type="button" onclick="deleteIndexedDB()">Delete</button>
                    <button type="button" onclick="checkIndexedDBSize()">Check Size</button>
                </div>
            </form>
            <div id="idb-result" aria-live="polite" role="status"></div>
        </section>

        <section class="storage-section" id="cache-section">
            <h2>Cache (Service Worker)</h2>
            <form class="storage-form" onsubmit="event.preventDefault();">
                <div class="input-row">
                    <input type="text" id="cache-key" placeholder="Key" aria-label="Cache key">
                    <input type="text" id="cache-value" placeholder="Value" aria-label="Cache value">
                    <button type="button" onclick="setCache()">Set</button>
                </div>
                <div class="button-row">
                    <button type="button" onclick="getCache()">Fetch</button>
                    <button type="button" onclick="deleteCache()">Delete</button>
                    <button type="button" onclick="checkCacheSize()">Check Size</button>
                </div>
            </form>
            <div id="cache-result" aria-live="polite" role="status"></div>
        </section>
    </main>
    
    <script src="main.js"></script>
</body>
</html>
